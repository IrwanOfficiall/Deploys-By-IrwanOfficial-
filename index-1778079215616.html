<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment IrwanOfficial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    body {
      background: url('https://files.catbox.moe/btsy23.jpg') center top/cover no-repeat fixed;
      padding-top: 60px; /* Dorong semua konten ke bawah dikit */
    }
    .glass {
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 225, 0.3);
    }
    .hidden { display: none; }
    .glow-btn {
      box-shadow: 0 0 10px #00ffe1, 0 0 20px #00ffe1;
    }
    .glow-btn:hover {
      box-shadow: 0 0 15px #00ffe1, 0 0 30px #00ffe1, 0 0 40px #0ff;
    }
    .cyber-title {
      font-family: 'Orbitron', sans-serif;
      color: #00ffe1;
      text-shadow: 0 0 5px #00ffe1, 0 0 15px #00ffe1, 0 0 30px #0ff;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- HALAMAN LOADING -->
  <div id="loadingPage" class="glass rounded-3xl p-8 max-w-sm w-full text-white shadow-2xl text-center">
    <p class="text-lg font-bold mb-1">Halo Selamat Datang Di</p>
    
    <!-- TEKS UTAMA DINAIKIN + CYBER GLOW -->
    <h1 class="cyber-title text-4xl font-extrabold mb-8 leading-tight">
      Payment<br>YanModss
    </h1>
    
    <button 
      onclick="masukPayment()" 
      class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 py-3 rounded-xl font-semibold hover:scale-105 active:scale-95 transition glow-btn"
    >
      Lanjut ke Payment →
    </button>
  </div>

  <!-- HALAMAN PAYMENT -->
  <div id="paymentPage" class="hidden glass rounded-3xl p-6 max-w-sm w-full text-white shadow-2xl">
    <h1 class="text-2xl font-bold text-center mb-6">Bayar Disini 💸</h1>
    
    <!-- QRIS -->
    <div class="mb-6">
      <p class="text-sm mb-2 text-center opacity-80">YanModss</p>
      <img 
        src="https://files.catbox.moe/eclb90.jpg" 
        alt="YanModss" 
        class="rounded-2xl w-full cursor-pointer hover:scale-105 transition active:scale-95"
        onclick="copyText('—͟͞𝐈𝐫𝐰𝐚𝐧𝐎𝐟𝐟𝐢𝐜𝐢𝐚𝐥 open jasa pembuatan web payment dll, minta? bisa chat nomor ini wa.me/6283147562656', this)"
      >
      <p class="text-xs text-center mt-2 opacity-60">YanModss</p>
      
      <a 
        href="https://files.catbox.moe/eclb90.jpg" 
        download="YanModss.jpg"
        class="mt-3 w-full bg-gradient-to-r from-cyan-400 to-blue-500 py-2.5 rounded-xl font-semibold hover:scale-105 active:scale-95 transition text-center block glow-btn"
      >
        ⬇ YanModss
      </a>
    </div>

    <!-- DANA & GOPAY -->
    <div class="space-y-3">
      <!-- DANA -->
      <div class="glass rounded-2xl p-4 cursor-pointer hover:bg-white/20 transition active:scale-95" 
           onclick="copyText('089502080369', this)">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <img src="https://files.catbox.moe/6x5wo9.jpg" class="w-10 h-10 rounded-lg" alt="DANA">
            <div>
              <p class="font-semibold">DANA</p>
              <p class="text-sm opacity-80">089502080369</p>
              <p class="text-xs opacity-60">𝐘𝐚𝐧𝐦𝐨𝐝𝐬𝐬</p>
            </div>
          </div>
          <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
          </svg>
        </div>
      </div>

      <!-- GOPAY -->
      <div class="glass rounded-2xl p-4 cursor-pointer hover:bg-white/20 transition active:scale-95" 
           onclick="copyText('082315861286', this)">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <img src="https://files.catbox.moe/fon2g7.jpg" class="w-10 h-10 rounded-lg bg-white p-1" alt="GoPay">
            <div>
              <p class="font-semibold">GoPay</p>
              <p class="text-sm opacity-80">082315861286</p>
              <p class="text-xs opacity-60">𝐄𝐋𝐏𝐈𝐀𝐍𝐈</p>
            </div>
          </div>
          <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
          </svg>
        </div>
      </div>
    </div>
    <p class="text-xs text-center mt-2 opacity-60">Klik untuk copy nomor</p>
    <p id="toast" class="text-center text-sm mt-4 h-5 text-green-300 font-semibold"></p>
  </div>

  <script>
    function masukPayment() {
      document.getElementById('loadingPage').classList.add('hidden');
      document.getElementById('paymentPage').classList.remove('hidden');
    }

    function copyText(text, el) {
      navigator.clipboard.writeText(text);
      const toast = document.getElementById('toast');
      toast.innerText = 'Berhasil di-copy ✅';
      el.classList.add('ring-2', 'ring-green-400');
      setTimeout(() => {
        toast.innerText = '';
        el.classList.remove('ring-2', 'ring-green-400');
      }, 1500);
    }
  </script>
</body>
</html>
